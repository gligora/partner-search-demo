<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務支援AIエージェント｜お問い合わせ商品検索システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-icon { font-size: 28px; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.03em; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

  /* ── Flow indicator ── */
  .flow-bar {
    background: white;
    border-bottom: 1px solid #e2e8f0;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    font-size: 12px;
  }
  .flow-step {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    white-space: nowrap;
    color: #718096;
    font-weight: 500;
    transition: all 0.3s;
  }
  .flow-step.active { background: #ebf8ff; color: #2b6cb0; font-weight: 700; }
  .flow-step.done { background: #f0fff4; color: #276749; }
  .flow-arrow { color: #cbd5e0; font-size: 14px; padding: 0 4px; }

  /* ── Main layout ── */
  .main { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

  /* ── Search card ── */
  .search-card {
    background: white;
    border-radius: 12px;
    padding: 28px 32px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .search-card h2 { font-size: 15px; color: #4a5568; margin-bottom: 16px; font-weight: 600; }
  .search-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .search-input {
    flex: 1;
    padding: 12px 16px;
    font-size: 15px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .search-input:focus { border-color: #4299e1; }
  .btn-search {
    background: linear-gradient(135deg, #2b6cb0, #3182ce);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-search:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-search:active { transform: translateY(0); }
  .suggestion-chips {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    background: #edf2f7;
    border: none;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: #4a5568;
    transition: background 0.15s;
    font-family: inherit;
  }
  .chip:hover { background: #e2e8f0; }

  /* ── Result panels ── */
  #result-area { display: none; }

  /* Status banner */
  .status-banner {
    padding: 14px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
    font-size: 14px;
  }
  .status-banner.in-stock {
    background: #f0fff4;
    border: 1.5px solid #68d391;
    color: #276749;
  }
  .status-banner.not-in-stock {
    background: #fff5f5;
    border: 1.5px solid #fc8181;
    color: #9b2c2c;
  }
  .status-icon { font-size: 22px; }

  /* ── Own product card ── */
  .own-product-card {
    background: white;
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .own-product-card h3 { font-size: 13px; color: #718096; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .product-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #f7fafc;
    border-radius: 8px;
    border-left: 4px solid #48bb78;
  }
  .product-name { font-weight: 700; font-size: 15px; }
  .product-meta { font-size: 12px; color: #718096; margin-top: 2px; }
  .stock-badge {
    background: #c6f6d5;
    color: #276749;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  /* ── Partner table ── */
  .partner-section {
    background: white;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .partner-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .partner-section-header h3 {
    font-size: 15px;
    font-weight: 700;
    color: #2d3748;
  }
  .partner-count-badge {
    background: #ebf8ff;
    color: #2b6cb0;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .partner-table { width: 100%; border-collapse: collapse; }
  .partner-table thead th {
    text-align: left;
    font-size: 11px;
    color: #718096;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 12px;
    border-bottom: 2px solid #e2e8f0;
  }
  .partner-table tbody tr {
    border-bottom: 1px solid #f7fafc;
    transition: background 0.15s;
    cursor: pointer;
  }
  .partner-table tbody tr:hover { background: #f7fafc; }
  .partner-table td { padding: 12px 12px; font-size: 14px; vertical-align: middle; }

  .rank-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 13px;
    background: #edf2f7;
    color: #4a5568;
  }
  .rank-badge.top-1 { background: #2b6cb0; color: white; }
  .rank-badge.top-2 { background: #bee3f8; color: #1a365d; }
  .rank-badge.top-3 { background: #ebf8ff; color: #2b6cb0; }

  .partner-table tbody tr.row-rank-1 { background: #ebf8ff; }
  .partner-table tbody tr.row-rank-2 { background: #f0f8ff; }
  .partner-table tbody tr.row-rank-3 { background: #f7fbff; }
  .partner-table tbody tr.row-rank-1:hover { background: #dbeafe; }
  .partner-table tbody tr.row-rank-2:hover { background: #e6f3ff; }
  .partner-table tbody tr.row-rank-3:hover { background: #eef7ff; }


  .contact-btn {
    background: #ebf8ff;
    color: #2b6cb0;
    border: 1.5px solid #90cdf4;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .contact-btn:hover { background: #bee3f8; }

  /* ── Email modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 14px;
    padding: 28px 32px;
    width: 560px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; color: #718096; font-weight: 600; margin-bottom: 5px; }
  .modal-field input, .modal-field textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-field input:focus, .modal-field textarea:focus { border-color: #4299e1; }
  .modal-field textarea { resize: vertical; min-height: 120px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { background: #edf2f7; color: #4a5568; border: none; padding: 9px 20px; border-radius: 7px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-send { background: #2b6cb0; color: white; border: none; padding: 9px 22px; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-send:hover { background: #2c5282; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: #2f855a; color: white;
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    z-index: 200;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Loading spinner ── */
  .spinner {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 20px 0;
    color: #4a5568;
    font-size: 14px;
  }
  .spinner.visible { display: flex; }
  .spin-ring {
    width: 22px; height: 22px;
    border: 3px solid #e2e8f0;
    border-top-color: #4299e1;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* responsive */
  @media (max-width: 600px) {
    .header { padding: 16px 18px; }
    .main { padding: 20px 12px; }
    .search-card { padding: 20px 16px; }
    .partner-table thead { display: none; }
    .partner-table td { display: block; padding: 6px 10px; }

</style>
</head>

// ============================================================
// Helpers
// ============================================================
function setSearch(val) {
  document.getElementById('search-input').value = val;
}

function setFlow(step) {
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('flow-' + i);
    el.className = 'flow-step';
    if (i < step) el.classList.add('done');
    else if (i === step) el.classList.add('active');
  }
}

function showSpinner(text) {
  const s = document.getElementById('spinner');
  document.getElementById('spinner-text').textContent = text;
  s.classList.add('visible');
}
function hideSpinner() {
  document.getElementById('spinner').classList.remove('visible');
}

function fmt(n) { return n.toLocaleString(); }
function fmtYen(n) { return '¥' + n.toLocaleString(); }

// ============================================================
// Fuzzy match: find best keyword match in transactionHistory
// ============================================================
function findBestMatch(query) {
  query = query.trim().toLowerCase();
  let bestKey = null, bestScore = 0;
  for (const key of Object.keys(transactionHistory)) {
    const kl = key.toLowerCase();
    // exact
    if (kl === query) return key;
    // contains
    let score = 0;
    const qTokens = query.split(/\s+/);
    const kTokens = kl.split(/\s+/);
    for (const qt of qTokens) {
      for (const kt of kTokens) {
        if (kt.includes(qt) || qt.includes(kt)) score += 2;
        else if (kl.includes(qt) || query.includes(kt)) score += 1;
      }
    }
    if (score > bestScore) { bestScore = score; bestKey = key; }
  }
  return bestScore > 0 ? bestKey : null;
}

// ============================================================
// Check own inventory
// ============================================================
function checkOwnInventory(query) {
  query = query.trim().toLowerCase();
  return ownInventory.find(p => {
    const name = p.name.toLowerCase();
    return name.includes(query) || query.includes(name) ||
           query.split(/\s+/).some(t => name.includes(t));
  });
}

// ============================================================
// Main search flow
// ============================================================
function runSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) { alert('商品名を入力してください。'); return; }

  const resultArea = document.getElementById('result-area');
  resultArea.style.display = 'none';
  setFlow(1);

  // Step 1: receiving inquiry
  setTimeout(() => {
    setFlow(2);
    showSpinner('自社在庫データベースを照合中...');
  }, 400);

  // Step 2: check own stock
  setTimeout(() => {
    const ownItem = checkOwnInventory(query);

    if (ownItem) {
      // In stock
      hideSpinner();
      setFlow(2);
      renderInStock(query, ownItem);
    } else {
      // Not in stock → partner search
      setFlow(3);
      document.getElementById('spinner-text').textContent = 'パートナーDBを検索・取引実績を集計中...';

      setTimeout(() => {
        setFlow(4);
        document.getElementById('spinner-text').textContent = '取引件数でランキングを生成中...';

        setTimeout(() => {
          hideSpinner();
          renderPartners(query);
        }, 700);
      }, 800);
    }
  }, 1200);
}

// ============================================================
// Render: in-stock result
// ============================================================
function renderInStock(query, item) {
  const banner = document.getElementById('status-banner');
  banner.className = 'status-banner in-stock';
  banner.innerHTML = `<span class="status-icon">✅</span>
    <div><strong>自社在庫あり</strong>　「${item.name}」は自社で取り扱っています。<br>
    <span style="font-size:12px;font-weight:400">在庫${fmt(item.stock)}${item.unit}　単価 ${fmtYen(item.price)}　カテゴリ：${item.category}</span></div>`;

  document.getElementById('own-product-area').innerHTML = `
    <div class="own-product-card">
      <h3>自社取り扱い商品</h3>
      <div class="product-item">
        <div>
          <div class="product-name">${item.name}</div>
          <div class="product-meta">カテゴリ：${item.category}　在庫数：${fmt(item.stock)} ${item.unit}　単価：${fmtYen(item.price)}</div>
        </div>
        <span class="stock-badge">在庫あり</span>
      </div>
      <p style="margin-top:14px;font-size:13px;color:#718096;">
        この商品は自社で対応可能です。通常の見積もりフローに進んでください。
      </p>
    </div>`;

  document.getElementById('partner-area').innerHTML = '';
  showResult();
}

// ============================================================
// Render: partner ranking
// ============================================================
function renderPartners(query) {
  const matchKey = findBestMatch(query);
  const banner = document.getElementById('status-banner');

  document.getElementById('own-product-area').innerHTML = '';

  banner.className = 'status-banner not-in-stock';
  banner.innerHTML = `<span class="status-icon">⚠️</span>
    <div><strong>自社在庫なし</strong>　「${query}」は自社では取り扱っていません。<br>
    <span style="font-size:12px;font-weight:400">パートナーDBから過去の取引実績が多い業者を自動提示しています。</span></div>`;

  if (!matchKey) {
    document.getElementById('partner-area').innerHTML = `
      <div style="background:white;border-radius:12px;padding:32px;text-align:center;color:#718096;box-shadow:0 1px 6px rgba(0,0,0,0.08)">
        <div style="font-size:36px;margin-bottom:12px">🔍</div>
        <p style="font-weight:600">「${query}」に関する過去取引実績が見つかりませんでした。</p>
        <p style="font-size:13px;margin-top:8px">他の商品名でお試しいただくか、手動でパートナーを選択してください。</p>
      </div>`;
    showResult();
    return;
  }

  const txList = transactionHistory[matchKey];

  const rows = txList.map((tx, i) => {
    const partner = partnerDB.find(p => p.id === tx.partnerId);
    if (!partner) return '';
    const rowClass = i === 0 ? 'row-rank-1' : i === 1 ? 'row-rank-2' : i === 2 ? 'row-rank-3' : '';
    const badgeClass = i === 0 ? 'top-1' : i === 1 ? 'top-2' : i === 2 ? 'top-3' : '';
    return `
      <tr class="${rowClass}">
        <td style="text-align:center"><span class="rank-badge ${badgeClass}">${i+1}</span></td>
        <td>
          <div style="font-weight:700">${partner.name}</div>
          <div style="font-size:11px;color:#718096;margin-top:2px">${partner.area}</div>
        </td>
        <td>
          <div style="font-size:13px">${partner.contact}</div>
        </td>
        <td>
          <div style="font-size:13px">${partner.tel}</div>
        </td>
        <td style="font-weight:700;color:#2b6cb0;text-align:right">${fmt(tx.count)}</td>
        <td style="color:#4a5568;text-align:right">${fmtYen(tx.amount)}</td>
        <td>
          <button class="contact-btn" onclick="openModal('${partner.id}','${partner.name}','${partner.contact}','${partner.email}','${query}')">
            メール作成
          </button>
        </td>
      </tr>`;
  }).join('');

  document.getElementById('partner-area').innerHTML = `
    <div class="partner-section">
      <div class="partner-section-header">
        <h3>🏆 パートナー取引実績ランキング　<span style="font-size:13px;font-weight:400;color:#718096">「${matchKey}」 の過去取引データより</span></h3>
        <span class="partner-count-badge">${txList.length}社</span>
      </div>
      <table class="partner-table">
        <thead>
          <tr>
            <th style="text-align:center">順位</th>
            <th>取引先名</th>
            <th>担当者</th>
            <th>電話番号</th>
            <th style="text-align:right">取引件数</th>
            <th style="text-align:right">累計金額</th>
            <th>アクション</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <p style="margin-top:16px;font-size:12px;color:#a0aec0">
        ※ データは過去3年間の請求情報を集計したものです。「メール作成」ボタンから問い合わせメールを自動生成できます。
      </p>
    </div>`;

  setFlow(5);
  showResult();
}

function showResult() {
  const r = document.getElementById('result-area');
  r.style.display = 'block';
  r.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
