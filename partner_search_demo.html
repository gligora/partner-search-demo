<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務支援AIエージェント｜お問い合わせ商品検索システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-icon { font-size: 28px; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.03em; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

  /* ── Flow indicator ── */
  .flow-bar {
    background: white;
    border-bottom: 1px solid #e2e8f0;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    font-size: 12px;
  }
  .flow-step {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    white-space: nowrap;
    color: #718096;
    font-weight: 500;
    transition: all 0.3s;
  }
  .flow-step.active { background: #ebf8ff; color: #2b6cb0; font-weight: 700; }
  .flow-step.done { background: #f0fff4; color: #276749; }
  .flow-arrow { color: #cbd5e0; font-size: 14px; padding: 0 4px; }

  /* ── Main layout ── */
  .main { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

  /* ── Search card ── */
  .search-card {
    background: white;
    border-radius: 12px;
    padding: 28px 32px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .search-card h2 { font-size: 15px; color: #4a5568; margin-bottom: 16px; font-weight: 600; }
  .search-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .search-input {
    flex: 1;
    padding: 12px 16px;
    font-size: 15px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .search-input:focus { border-color: #4299e1; }
  .btn-search {
    background: linear-gradient(135deg, #2b6cb0, #3182ce);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-search:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-search:active { transform: translateY(0); }
  .suggestion-chips {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    background: #edf2f7;
    border: none;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: #4a5568;
    transition: background 0.15s;
    font-family: inherit;
  }
  .chip:hover { background: #e2e8f0; }

  /* ── Result panels ── */
  #result-area { display: none; }

  /* Status banner */
  .status-banner {
    padding: 14px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
    font-size: 14px;
  }
  .status-banner.in-stock {
    background: #f0fff4;
    border: 1.5px solid #68d391;
    color: #276749;
  }
  .status-banner.not-in-stock {
    background: #fff5f5;
    border: 1.5px solid #fc8181;
    color: #9b2c2c;
  }
  .status-icon { font-size: 22px; }

  /* ── Own product card ── */
  .own-product-card {
    background: white;
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .own-product-card h3 { font-size: 13px; color: #718096; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .product-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #f7fafc;
    border-radius: 8px;
    border-left: 4px solid #48bb78;
  }
  .product-name { font-weight: 700; font-size: 15px; }
  .product-meta { font-size: 12px; color: #718096; margin-top: 2px; }
  .stock-badge {
    background: #c6f6d5;
    color: #276749;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  /* ── Quote form ── */
  .quote-form-card {
    background: white;
    border-radius: 12px;
    padding: 24px 28px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .quote-form-card h3 { font-size: 15px; font-weight: 700; color: #2d3748; margin-bottom: 18px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  @media(max-width:640px){ .form-grid { grid-template-columns: 1fr; } }
  .form-group label { display: block; font-size: 12px; color: #718096; font-weight: 600; margin-bottom: 5px; }
  .form-group select, .form-group input[type=number] {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid #e2e8f0; border-radius: 7px;
    font-size: 13px; font-family: inherit; outline: none;
    transition: border-color 0.2s; background: white;
  }
  .form-group select:focus, .form-group input[type=number]:focus { border-color: #4299e1; }
  .btn-generate {
    background: linear-gradient(135deg, #276749, #38a169);
    color: white; border: none;
    padding: 11px 26px; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s; font-family: inherit;
  }
  .btn-generate:hover { opacity: 0.9; }

  /* ── Quote preview ── */
  .quote-preview {
    background: white;
    border-radius: 12px;
    padding: 28px 32px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 24px;
    border-top: 4px solid #38a169;
  }
  .quote-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .quote-title { font-size: 22px; font-weight: 800; color: #2d3748; }
  .quote-meta { font-size: 12px; color: #718096; text-align: right; line-height: 1.8; }
  .quote-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; padding: 16px; background: #f7fafc; border-radius: 8px; }
  .quote-party-label { font-size: 11px; color: #718096; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .quote-party-name { font-size: 15px; font-weight: 700; color: #2d3748; }
  .quote-party-sub { font-size: 12px; color: #718096; margin-top: 3px; line-height: 1.6; }
  .quote-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .quote-table th { background: #2d3748; color: white; padding: 9px 12px; font-size: 12px; text-align: left; }
  .quote-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #e2e8f0; }
  .quote-table tr:last-child td { border-bottom: none; }
  .quote-total-row { background: #f0fff4; }
  .quote-total-row td { font-weight: 700; font-size: 15px; color: #276749; }
  .quote-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
  .quote-validity { font-size: 12px; color: #718096; }
  .btn-send-quote {
    background: linear-gradient(135deg, #2b6cb0, #3182ce);
    color: white; border: none;
    padding: 11px 24px; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: opacity 0.2s;
  }
  .btn-send-quote:hover { opacity: 0.9; }

  /* ── Partner table ── */
  .partner-section {
    background: white;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .partner-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .partner-section-header h3 {
    font-size: 15px;
    font-weight: 700;
    color: #2d3748;
  }
  .partner-count-badge {
    background: #ebf8ff;
    color: #2b6cb0;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .partner-table { width: 100%; border-collapse: collapse; }
  .partner-table thead th {
    text-align: left;
    font-size: 11px;
    color: #718096;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 12px;
    border-bottom: 2px solid #e2e8f0;
  }
  .partner-table tbody tr {
    border-bottom: 1px solid #f7fafc;
    transition: background 0.15s;
    cursor: pointer;
  }
  .partner-table tbody tr:hover { background: #f7fafc; }
  .partner-table td { padding: 12px 12px; font-size: 14px; vertical-align: middle; }

  .rank-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 13px;
    background: #edf2f7;
    color: #4a5568;
  }
  .rank-badge.top-1 { background: #2b6cb0; color: white; }
  .rank-badge.top-2 { background: #bee3f8; color: #1a365d; }
  .rank-badge.top-3 { background: #ebf8ff; color: #2b6cb0; }

  .partner-table tbody tr.row-rank-1 { background: #ebf8ff; }
  .partner-table tbody tr.row-rank-2 { background: #f0f8ff; }
  .partner-table tbody tr.row-rank-3 { background: #f7fbff; }
  .partner-table tbody tr.row-rank-1:hover { background: #dbeafe; }
  .partner-table tbody tr.row-rank-2:hover { background: #e6f3ff; }
  .partner-table tbody tr.row-rank-3:hover { background: #eef7ff; }


  .contact-btn {
    background: #ebf8ff;
    color: #2b6cb0;
    border: 1.5px solid #90cdf4;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .contact-btn:hover { background: #bee3f8; }

  /* ── Email modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 14px;
    padding: 28px 32px;
    width: 560px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; color: #718096; font-weight: 600; margin-bottom: 5px; }
  .modal-field input, .modal-field textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-field input:focus, .modal-field textarea:focus { border-color: #4299e1; }
  .modal-field textarea { resize: vertical; min-height: 120px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { background: #edf2f7; color: #4a5568; border: none; padding: 9px 20px; border-radius: 7px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-send { background: #2b6cb0; color: white; border: none; padding: 9px 22px; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-send:hover { background: #2c5282; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: #2f855a; color: white;
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    z-index: 200;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Loading spinner ── */
  .spinner {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 20px 0;
    color: #4a5568;
    font-size: 14px;
  }
  .spinner.visible { display: flex; }
  .spin-ring {
    width: 22px; height: 22px;
    border: 3px solid #e2e8f0;
    border-top-color: #4299e1;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Feature tabs ── */
  .tab-nav {
    background: white;
    border-bottom: 2px solid #e2e8f0;
    display: flex;
    padding: 0 32px;
    gap: 0;
  }
  .tab-btn {
    padding: 14px 28px;
    border: none; border-bottom: 3px solid transparent;
    background: none; cursor: pointer;
    font-size: 14px; font-weight: 600; color: #718096;
    font-family: inherit; white-space: nowrap;
    transition: all 0.2s; margin-bottom: -2px;
    display: flex; align-items: center; gap: 8px;
  }
  .tab-btn.active { color: #2b6cb0; border-bottom-color: #2b6cb0; }
  .tab-btn:hover:not(.active) { color: #4a5568; background: #f7fafc; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── AI action panel ── */
  .ai-rep-card {
    background: white; border-radius: 12px;
    padding: 28px 32px; box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .ai-rep-card h2 { font-size: 15px; color: #4a5568; margin-bottom: 16px; font-weight: 600; }
  .rep-select-row { display: flex; gap: 10px; align-items: center; }
  .rep-select {
    flex: 1; padding: 12px 16px; font-size: 15px;
    border: 2px solid #e2e8f0; border-radius: 8px;
    outline: none; font-family: inherit; background: white;
    transition: border-color 0.2s;
  }
  .rep-select:focus { border-color: #4299e1; }
  .btn-ai-plan {
    background: linear-gradient(135deg, #553c9a, #6b46c1);
    color: white; border: none; padding: 12px 24px;
    border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-ai-plan:hover { opacity: 0.9; }

  /* Summary KPI cards */
  .kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 24px; }
  @media(max-width:600px){ .kpi-row { grid-template-columns: 1fr; } }
  .kpi-card {
    background: white; border-radius: 10px; padding: 18px 20px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08); border-top: 4px solid #e2e8f0;
  }
  .kpi-card.urgent { border-top-color: #fc8181; }
  .kpi-card.warn   { border-top-color: #f6ad55; }
  .kpi-card.good   { border-top-color: #68d391; }
  .kpi-label { font-size: 11px; color: #718096; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .kpi-value { font-size: 28px; font-weight: 800; color: #2d3748; margin: 6px 0 2px; }
  .kpi-sub   { font-size: 12px; color: #a0aec0; }

  /* Visit priority list */
  .action-section {
    background: white; border-radius: 12px; padding: 24px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 24px;
  }
  .action-section h3 { font-size: 15px; font-weight: 700; color: #2d3748; margin-bottom: 16px; }
  .visit-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid #f0f4f8;
  }
  .visit-item:last-child { border-bottom: none; }
  .visit-order {
    width: 32px; height: 32px; border-radius: 50%;
    background: #2b6cb0; color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .visit-order.first { background: #e53e3e; }
  .visit-body { flex: 1; }
  .visit-name { font-weight: 700; font-size: 14px; }
  .visit-sub  { font-size: 12px; color: #718096; margin-top: 3px; line-height: 1.6; }
  .visit-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .tag {
    padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .tag-red    { background: #fff5f5; color: #c53030; }
  .tag-orange { background: #fffaf0; color: #c05621; }
  .tag-blue   { background: #ebf8ff; color: #2b6cb0; }
  .tag-green  { background: #f0fff4; color: #276749; }
  .visit-score {
    text-align: right; flex-shrink: 0;
  }
  .score-num  { font-size: 20px; font-weight: 800; color: #553c9a; }
  .score-label{ font-size: 10px; color: #a0aec0; display: block; }
  .visit-action-btn {
    background: #ebf8ff; color: #2b6cb0;
    border: 1.5px solid #90cdf4; padding: 5px 12px;
    border-radius: 6px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 8px;
    transition: background 0.15s;
  }
  .visit-action-btn:hover { background: #bee3f8; }

  /* Today's visit highlight in status table */
  .today-visit-row { background: #faf5ff !important; }
  .today-visit-row:hover { background: #f3e8ff !important; }
  .today-visit-row td:first-child { border-left: 3px solid #805ad5; }
  .today-badge {
    background: #553c9a; color: white;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }

  /* Route plan */
  .route-card {
    background: linear-gradient(135deg, #f7f4ff, #faf5ff);
    border: 1.5px solid #d6bcfa; border-radius: 12px;
    padding: 22px 24px; margin-bottom: 24px;
  }
  .route-card h3 { font-size: 15px; font-weight: 700; color: #553c9a; margin-bottom: 14px; }
  .route-steps { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .route-node {
    background: white; border: 1.5px solid #b794f4;
    border-radius: 8px; padding: 7px 14px;
    font-size: 12px; font-weight: 600; color: #553c9a;
  }
  .route-node.base { background: #553c9a; color: white; border-color: #553c9a; }
  .route-arrow { color: #b794f4; font-size: 16px; }

  /* responsive */
  @media (max-width: 600px) {
    .header { padding: 16px 18px; }
    .main { padding: 20px 12px; }
    .search-card { padding: 20px 16px; }
    .partner-table thead { display: none; }
    .partner-table td { display: block; padding: 6px 10px; }
    .tab-nav { padding: 0 12px; }
    .tab-btn { padding: 12px 14px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">
    <!-- 重機（クレーン）ロゴ -->
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- タワークレーン -->
      <!-- 垂直支柱 -->
      <rect x="21" y="10" width="4" height="28" rx="1" fill="white" opacity="0.95"/>
      <!-- 水平ブーム（左長・右短） -->
      <rect x="6" y="10" width="34" height="3.5" rx="1" fill="white" opacity="0.95"/>
      <!-- カウンターウェイト側（右端の重り） -->
      <rect x="36" y="13.5" width="4" height="5" rx="1" fill="#90cdf4"/>
      <!-- フック用ワイヤー -->
      <line x1="14" y1="13.5" x2="14" y2="30" stroke="white" stroke-width="1.2" opacity="0.8"/>
      <!-- フック -->
      <path d="M11.5 30 Q14 35 16.5 30" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- 地面ベース -->
      <rect x="8" y="37" width="26" height="3.5" rx="1.5" fill="white" opacity="0.85"/>
      <!-- 車輪 左 -->
      <circle cx="13" cy="42" r="2.5" fill="white" opacity="0.9"/>
      <circle cx="13" cy="42" r="1" fill="#2b6cb0"/>
      <!-- 車輪 右 -->
      <circle cx="29" cy="42" r="2.5" fill="white" opacity="0.9"/>
      <circle cx="29" cy="42" r="1" fill="#2b6cb0"/>
      <!-- キャブ（運転席） -->
      <rect x="19" y="24" width="8" height="7" rx="1" fill="#90cdf4" opacity="0.9"/>
      <rect x="20.5" y="25.5" width="5" height="3.5" rx="0.5" fill="#1a365d" opacity="0.7"/>
    </svg>
  </div>
  <div>

function setSearch(val) {
  document.getElementById('search-input').value = val;

function setFlow(step) {
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('flow-' + i);
    el.className = 'flow-step';
    if (i < step) el.classList.add('done');
    else if (i === step) el.classList.add('active');
  }
}

function showSpinner(text) {
  const s = document.getElementById('spinner');
  document.getElementById('spinner-text').textContent = text;
  s.classList.add('visible');
}
function hideSpinner() {
  document.getElementById('spinner').classList.remove('visible');
}

function fmtYen(n) { return '¥' + n.toLocaleString(); }

  let bestKey = null, bestScore = 0;
  for (const key of Object.keys(transactionHistory)) {
    const kl = key.toLowerCase();
    // exact
    if (kl === query) return key;
    // contains
    let score = 0;
    const qTokens = query.split(/\s+/);
    const kTokens = kl.split(/\s+/);
    for (const qt of qTokens) {
      for (const kt of kTokens) {
        if (kt.includes(qt) || qt.includes(kt)) score += 2;
        else if (kl.includes(qt) || query.includes(kt)) score += 1;
      }
    }
    if (score > bestScore) { bestScore = score; bestKey = key; }
  }
  return bestScore > 0 ? bestKey : null;
}

// Check own inventory
// ============================================================
function checkOwnInventory(query) {
  query = query.trim().toLowerCase();
  return ownInventory.find(p => {
    const name = p.name.toLowerCase();
    return name.includes(query) || query.includes(name) ||
           query.split(/\s+/).some(t => name.includes(t));
  });
}

// ============================================================
// Main search flow
// ============================================================
function runSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) { alert('商品名を入力してください。'); return; }

  const resultArea = document.getElementById('result-area');
  resultArea.style.display = 'none';
  setFlow(1);

  // Step 1: receiving inquiry
  setTimeout(() => {
    setFlow(2);
    showSpinner('自社在庫データベースを照合中...');
  }, 400);

  // Step 2: check own stock
  setTimeout(() => {
    const ownItem = checkOwnInventory(query);

    if (ownItem) {
      // In stock
      hideSpinner();
      setFlow(2);
      renderInStock(query, ownItem);
    } else {
      // Not in stock → partner search
      setFlow(3);
      document.getElementById('spinner-text').textContent = 'パートナーDBを検索・取引実績を集計中...';

      setTimeout(() => {
        setFlow(4);
        document.getElementById('spinner-text').textContent = '取引件数でランキングを生成中...';

        setTimeout(() => {
          hideSpinner();
          renderPartners(query);
        }, 700);
      }, 800);
    }
  }, 1200);
}

function renderPartners(query) {
  const matchKey = findBestMatch(query);
  const banner = document.getElementById('status-banner');

  document.getElementById('own-product-area').innerHTML = '';

  banner.className = 'status-banner not-in-stock';
  banner.innerHTML = `<span class="status-icon">⚠️</span>
    <div><strong>自社在庫なし</strong>　「${query}」は自社では取り扱っていません。<br>
    <span style="font-size:12px;font-weight:400">パートナーDBから過去の取引実績が多い業者を自動提示しています。</span></div>`;

  if (!matchKey) {
    document.getElementById('partner-area').innerHTML = `
      <div style="background:white;border-radius:12px;padding:32px;text-align:center;color:#718096;box-shadow:0 1px 6px rgba(0,0,0,0.08)">
        <div style="font-size:36px;margin-bottom:12px">🔍</div>

      </div>`;
    showResult();
    return;
  }

  const txList = transactionHistory[matchKey];

  const rows = txList.map((tx, i) => {
    const partner = partnerDB.find(p => p.id === tx.partnerId);
    if (!partner) return '';
    const rowClass = i === 0 ? 'row-rank-1' : i === 1 ? 'row-rank-2' : i === 2 ? 'row-rank-3' : '';
    const badgeClass = i === 0 ? 'top-1' : i === 1 ? 'top-2' : i === 2 ? 'top-3' : '';
    return `
      <tr class="${rowClass}">
        <td style="text-align:center"><span class="rank-badge ${badgeClass}">${i+1}</span></td>
        <td>
          <div style="font-weight:700">${partner.name}</div>
          <div style="font-size:11px;color:#718096;margin-top:2px">${partner.area}</div>
        </td>
        <td>
          <div style="font-size:13px">${partner.contact}</div>
        </td>
        <td>
          <div style="font-size:13px">${partner.tel}</div>
        </td>
        <td style="font-weight:700;color:#2b6cb0;text-align:right">${fmt(tx.count)}</td>
        <td style="color:#4a5568;text-align:right">${fmtYen(tx.amount)}</td>
        <td>
          <button class="contact-btn" onclick="openModal('${partner.id}','${partner.name}','${partner.contact}','${partner.email}','${query}')">
            メール作成
          </button>
        </td>
      </tr>`;
  }).join('');

  document.getElementById('partner-area').innerHTML = `

      <div class="partner-section-header">
        <h3>🏆 パートナー取引実績ランキング　<span style="font-size:13px;font-weight:400;color:#718096">「${matchKey}」 の過去取引データより</span></h3>
        <span class="partner-count-badge">${txList.length}社</span>
      </div>
      <table class="partner-table">
        <thead>
          <tr>
            <th style="text-align:center">順位</th>
            <th>取引先名</th>
            <th>担当者</th>
            <th>電話番号</th>
            <th style="text-align:right">取引件数</th>
            <th style="text-align:right">累計金額</th>

        ※ データは過去3年間の請求情報を集計したものです。「メール作成」ボタンから問い合わせメールを自動生成できます。
      </p>
    </div>`;

  setFlow(5);
  showResult();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('tab-' + tab + '-btn').classList.add('active');
  document.getElementById('flow-bar').style.display = tab === 'search' ? 'flex' : 'none';
}

// 優先スコア計算（日数・見積状況・金額で加重）
function calcScore(c) {
  let s = 0;
  s += Math.min(c.lastContact * 1.5, 60);
  if (c.quoteStatus.includes('未返答')) s += 30;
  if (c.quoteStatus.includes('交渉中')) s += 20;
  if (c.orderStatus === '休眠')        s += 15;
  if (c.orderStatus === '見込み客')    s += 10;
  if (c.quoteAmount > 1000000)         s += 15;
  if (c.quoteAmount > 2000000)         s += 10;
  return Math.min(Math.round(s), 99);
}

function getUrgencyTags(c) {
  const tags = [];
  if (c.lastContact >= 40)              tags.push({label:'長期未接触', cls:'tag-red'});
  if (c.quoteStatus.includes('未返答')) tags.push({label:'見積未返答', cls:'tag-orange'});
  if (c.quoteStatus.includes('交渉中')) tags.push({label:'価格交渉中', cls:'tag-blue'});
  if (c.orderStatus === '定期顧客')     tags.push({label:'定期顧客', cls:'tag-green'});
  if (c.orderStatus === '新規候補')     tags.push({label:'新規候補', cls:'tag-blue'});
  if (c.quoteAmount >= 2000000)         tags.push({label:'大口案件', cls:'tag-red'});
  return tags;
}

// ============================================================
// City / Prefecture clustering helpers
// ============================================================
function extractCityKey(city) {
  const m = city.match(/^.+?市/);
  return m ? m[0] : city;
}

// 移動時間の推定（同市区 / 同都道府県別市 / 他県）
function estimateTravelMin(fromCity, toCity) {
  if (!fromCity) return 30; // 自社出発
  const prefA = extractPrefecture(fromCity);
  const prefB = extractPrefecture(toCity);
  const keyA  = extractCityKey(fromCity);
  const keyB  = extractCityKey(toCity);
  if (keyA === keyB)   return 15; // 同一市区：約15分
  if (prefA === prefB) return 40; // 同一都道府県・別市：約40分
  return 90;                       // 他県：約90分
}

function extractPrefecture(city) {
  // 都道府県が明示されている場合（"愛知県豊田市", "北海道小樽市", "東京都江東区" 等）
  const m = city.match(/^(北海道|[^\s都道府県]+[都道府県])/);
  if (m) return m[1];
  // 政令市など県名が付かない表記のマッピング
  const map = {
    '横浜市':'神奈川県', '川崎市':'神奈川県', '相模原市':'神奈川県',
    '名古屋市':'愛知県',
    '大阪市':'大阪府', '堺市':'大阪府',
    '神戸市':'兵庫県',
    '福岡市':'福岡県', '北九州市':'福岡県',
    '熊本市':'熊本県', '鹿児島市':'鹿児島県',
    '札幌市':'北海道',
    '仙台市':'宮城県',
    '浜松市':'静岡県', '静岡市':'静岡県',
  };
  for (const [k, v] of Object.entries(map)) {
    if (city.startsWith(k)) return v;
  }
  return extractCityKey(city); // fallback
}

// ============================================================
// Generate AI action plan
// ============================================================
function generateActionPlan() {
  const repId = document.getElementById('rep-select').value;
  if (!repId) { alert('営業担当者を選択してください。'); return; }

  document.getElementById('ai-result').innerHTML = '';
  const sp = document.getElementById('ai-spinner');
  sp.classList.add('visible');
  document.getElementById('ai-spinner-text').textContent = 'SFAデータ・行動履歴を分析中...';

  setTimeout(() => {
    document.getElementById('ai-spinner-text').textContent = '訪問優先度スコアを算出中...';
  }, 600);
  setTimeout(() => {
    document.getElementById('ai-spinner-text').textContent = '最適ルートを計算中...';
  }, 1200);
  setTimeout(() => {
    sp.classList.remove('visible');
    renderActionPlan(repId);
  }, 1900);
}

function renderActionPlan(repId) {
  const rep       = salesReps.find(r => r.id === repId);
  const customers = sfaData[repId] || [];

  // スコア順に並べ替え
  const ranked = [...customers]
    .map(c => ({ ...c, score: calcScore(c) }))
    .sort((a, b) => b.score - a.score);

  // ── 緊急顧客（スコア80以上）はエリア問わず優先枠として確保 ──
  const urgentCustomers = ranked.filter(c => c.score >= 80).slice(0, 2);
  const urgentIds = new Set(urgentCustomers.map(c => c.id));

  // ── 都道府県レベルのクラスタリング（近隣市町村をまとめて1エリアとして扱う）──
  const prefGroups = {};
  for (const c of ranked) {
    const key = extractPrefecture(c.city);
    if (!prefGroups[key]) prefGroups[key] = [];
    prefGroups[key].push(c); // ranked順（スコア降順）なので既にソート済み
  }

  let bestPrefKey = null, bestPrefTotal = 0;
  for (const [key, members] of Object.entries(prefGroups)) {
    const total = members.reduce((sum, c) => sum + c.score, 0);
    if (total > bestPrefTotal) { bestPrefTotal = total; bestPrefKey = key; }
  }

  // 本日の訪問先：緊急顧客（最大2社）＋ 最優先エリアの上位顧客（合計5社まで）
  const clusterCustomers = (prefGroups[bestPrefKey] || ranked).filter(c => !urgentIds.has(c.id));
  const fillCount = Math.max(0, 5 - urgentCustomers.length);
  const todayVisits = [...urgentCustomers, ...clusterCustomers.slice(0, fillCount)];

  // KPI集計
  const kpiNoContact = customers.filter(c => c.lastContact >= 30).length;
  const kpiQuotePending = customers.filter(c => c.quoteStatus.includes('未返答')).length;
  const kpiOrdered = customers.filter(c => c.orderStatus.includes('受注') || c.orderStatus === '定期顧客').length;

  // ── 移動時間を考慮した訪問スケジュール（順次計算）← visitRows より先に定義 ──
  const fmtT = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  let schedMin = 9 * 60;
  let prevCity = null;
  const visitTimes = todayVisits.map(c => {
    const travel = estimateTravelMin(prevCity, c.city);
    const arrive = schedMin + travel;
    const depart = arrive + 45;
    schedMin = depart;
    prevCity = c.city;
    return { arrive: fmtT(arrive), depart: fmtT(depart), travel };
  });

  // Render
  const visitRows = todayVisits.map((c, i) => {
    const isUrgent = urgentIds.has(c.id);
    const tags = getUrgencyTags(c).map(t =>
      `<span class="tag ${t.cls}">${t.label}</span>`).join('');
    const vt = visitTimes[i];
    const travelBadge = vt.travel >= 40
      ? `<span style="font-size:11px;color:#718096;background:#f7fafc;padding:2px 7px;border-radius:20px;border:1px solid #e2e8f0">🚗 移動${vt.travel}分</span>`
      : '';
    return `
      <div class="visit-item" style="${isUrgent ? 'border-left:3px solid #e53e3e;padding-left:11px;' : ''}">
        <div class="visit-order ${i===0?'first':''}">${i+1}</div>
        <div class="visit-body">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            ${isUrgent ? '<span style="background:#fff5f5;color:#c53030;border:1px solid #fc8181;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700">🚨 緊急フォロー</span>' : ''}
            <div class="visit-name">${c.company}</div>
            <span style="font-size:12px;color:#805ad5;font-weight:600;background:#faf5ff;padding:2px 8px;border-radius:20px;border:1px solid #d6bcfa">🕐 ${vt.arrive}〜${vt.depart}</span>
            ${travelBadge}
          </div>
          <div class="visit-sub">
            担当：${c.contact}　📞 ${c.tel}　📍 ${c.city}<br>
            最終接触：${c.lastContact}日前　|　${c.quoteStatus}
            ${c.quoteAmount > 0 ? `　|　見積額：¥${c.quoteAmount.toLocaleString()}` : ''}
          </div>
          <div class="visit-tags">${tags}</div>
          <div style="font-size:12px;color:#553c9a;margin-top:6px;font-style:italic">💡 ${c.notes}</div>
          <button class="visit-action-btn" onclick="openVisitMail('${c.company}','${c.contact}')">
            📧 メール作成
          </button>
        </div>
        <div class="visit-score">
          <span class="score-num">${c.score}</span>
          <span class="score-label">優先スコア</span>
        </div>
      </div>`;
  }).join('');

  // 本日訪問IDセット（ステータス一覧ハイライト用）
  const todayVisitIds = new Set(todayVisits.map(c => c.id));

  // ルートノード（矢印に移動時間を表示）
  const routeStops = todayVisits.map((c, i) => {
    const cityKey  = extractCityKey(c.city);
    const district = c.city.length > cityKey.length ? c.city.slice(cityKey.length) : c.city;
    const t = visitTimes[i];
    return { company: c.company, district, arrive: t.arrive, depart: t.depart, travel: t.travel, urgent: urgentIds.has(c.id) };
  });

  const routeHtml = [
    `<span class="route-node base" style="display:inline-flex;flex-direction:column;align-items:center;gap:1px">
       <span style="font-size:10px;opacity:0.75">09:00</span>
       <span>自社（出発）</span>
     </span>`,
    ...routeStops.map(s =>
      `<span style="display:inline-flex;flex-direction:column;align-items:center;gap:2px">
         <span style="font-size:9px;color:#a0aec0;white-space:nowrap">🚗 ${s.travel}分</span>
         <span class="route-arrow">▶</span>
       </span>
       <span class="route-node" style="display:inline-flex;flex-direction:column;align-items:center;gap:1px${s.urgent ? ';border-color:#fc8181;background:#fff5f5;' : ''}">
         <span style="font-size:10px;color:${s.urgent ? '#c53030' : '#805ad5'};font-weight:600">${s.urgent ? '🚨 ' : ''}${s.arrive}〜${s.depart}</span>
         <span>${s.company}</span>
         <span style="font-size:10px;color:#a0aec0;font-weight:400">${s.district}</span>
       </span>`)
  ].join('');

  // エリア選定理由メッセージ
  const prefMemberCount = (prefGroups[bestPrefKey] || []).length;
  const urgentNote = urgentCustomers.length > 0
    ? `　｜　🚨 スコア80以上の緊急顧客 <strong>${urgentCustomers.length}社</strong> をエリア外優先枠として追加`
    : '';
  const areaNote = bestPrefKey
    ? `<div style="font-size:12px;color:#718096;margin-top:10px">
        📌 <strong>${bestPrefKey}エリア</strong>を本日の主訪問エリアとして選定（担当顧客${prefMemberCount}社中、優先スコア合計が最大）${urgentNote}。<br>
        ※推定移動時間：同市区15分 / 同県別市40分 / 他県90分。訪問時間45分で算出。
       </div>`
    : '';

  document.getElementById('ai-result').innerHTML = `
    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi-card urgent">
        <div class="kpi-label">要フォロー顧客</div>
        <div class="kpi-value">${kpiNoContact}</div>
        <div class="kpi-sub">30日以上未接触</div>
      </div>
      <div class="kpi-card warn">
        <div class="kpi-label">見積未返答</div>
        <div class="kpi-value">${kpiQuotePending}</div>
        <div class="kpi-sub">返答待ち案件</div>
      </div>
      <div class="kpi-card good">
        <div class="kpi-label">受注・定期顧客</div>
        <div class="kpi-value">${kpiOrdered}</div>
        <div class="kpi-sub">今月フォロー対象</div>
      </div>
    </div>

    <!-- 最適ルート -->
    <div class="route-card">
      <h3>🗺️ 本日の推奨訪問ルート</h3>
      <div class="route-steps">${routeHtml}</div>
      ${areaNote}
    </div>

    <!-- 訪問優先リスト -->
    <div class="action-section">
      <h3>📋 本日訪問すべき営業先リスト
        <span style="font-size:13px;font-weight:400;color:#718096">優先スコア順・${rep.name}（${rep.area}）${bestPrefKey ? `　エリア：${bestPrefKey}` : ''}${urgentCustomers.length > 0 ? `　🚨×${urgentCustomers.length}` : ''}</span>
      </h3>
      ${visitRows}
    </div>

    <!-- 全顧客一覧 -->
    <div class="action-section">
      <h3>📊 担当顧客ステータス一覧</h3>
      <table class="partner-table">
        <thead>
          <tr>
            <th>顧客名</th>
            <th>担当者</th>
            <th>電話番号</th>
            <th>最終接触</th>
            <th>見積状況</th>
            <th>ステータス</th>
            <th style="text-align:right">優先スコア</th>
            <th style="text-align:center">本日</th>
          </tr>
        </thead>
        <tbody>
          ${ranked.map((c,i) => {
            const isToday = todayVisitIds.has(c.id);
            const rowClass = isToday ? 'today-visit-row' : (i===0?'row-rank-1':i===1?'row-rank-2':i===2?'row-rank-3':'');
            return `
            <tr class="${rowClass}">
              <td style="font-weight:700">${c.company}</td>
              <td>${c.contact}</td>
              <td>${c.tel}</td>
              <td style="color:${c.lastContact>=30?'#e53e3e':'#718096'}">${c.lastContact}日前</td>
              <td style="font-size:12px">${c.quoteStatus}</td>
              <td><span class="tag ${c.orderStatus.includes('商談')?'tag-blue':c.orderStatus.includes('受注')||c.orderStatus==='定期顧客'?'tag-green':c.orderStatus==='休眠'?'tag-red':'tag-orange'}">${c.orderStatus}</span></td>
              <td style="text-align:right;font-weight:700;color:#553c9a">${c.score}</td>
              <td style="text-align:center">${isToday ? '<span class="today-badge">訪問予定</span>' : ''}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;

  document.getElementById('ai-result').scrollIntoView({ behavior:'smooth', block:'start' });
}

  document.getElementById('mail-subject').value = `【ご訪問のご挨拶】近日中にお伺いさせていただきたく存じます`;
  document.getElementById('mail-body').value =
`${company}
${contact} 様

近々お時間をいただき、ご挨拶かたがた最近のご状況を

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  // Populate rep selector
  const sel = document.getElementById('rep-select');
  salesReps.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = `${r.name}（担当エリア：${r.area}）`;
    sel.appendChild(opt);
  });

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') runSearch();
  });
});
</script>
